# 视频平台域名规则
platforms:
  bilibili:
    name: B站
    domains: [bilibili.com]
    video_patterns:
      - /video/BV[\w]+
      - /video/av\d+
      - /bangumi/play/
    non_video_patterns:
      - /blackboard/
      - message.bilibili.com
      - t.bilibili.com
      - live.bilibili.com
    history_api: https://api.bilibili.com/x/web-interface/history/cursor
    history_page: https://www.bilibili.com/history
    cookie_keys: [SESSDATA]
    login_check: https://api.bilibili.com/x/web-interface/nav
    
  douyin:
    name: 抖音
    domains: [douyin.com]
    video_patterns:
      - /video/\d+
      - /user/
    non_video_patterns: []
    history_api: https://www.douyin.com/aweme/v1/web/history/read/
    history_page: https://www.douyin.com/user/self?from_tab_name=main&showTab=record
    cookie_keys: [sessionid, passport_csrf_token]
    login_check: https://www.douyin.com/aweme/v1/web/user/profile/self/
    
  youtube:
    name: YouTube
    domains: [youtube.com, youtu.be]
    video_patterns:
      - /watch\?v=
      - /shorts/
      - youtu.be/
    non_video_patterns: []
    history_api: null
    history_page: https://www.youtube.com/feed/history
    cookie_keys: []
    login_check: null
